<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="排球二传插上教学 - 帮助初高中女排学员理解二传插上技术">
  <title>排球轮次站位教学 - 5-1阵型与二传插上可视化</title>

  <!-- Canonical & language alternates -->
  <link rel="canonical" href="https://jerrypeibuilds.github.io/volleyball-setter/zh/">
  <link rel="alternate" hreflang="zh-Hans" href="https://jerrypeibuilds.github.io/volleyball-setter/zh/">
  <link rel="alternate" hreflang="en" href="https://jerrypeibuilds.github.io/volleyball-setter/">
  <link rel="alternate" hreflang="x-default" href="https://jerrypeibuilds.github.io/volleyball-setter/">

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <!-- 语言切换按钮（固定右上角，所有页面可见） -->
  <!-- <div class="lang-switch" onclick="switchLang()">EN</div> -->
  <!-- 导入导出按钮 -->
  <div class="preset-actions">
    <button class="preset-icon-btn" title="导出站位" onclick="exportPositionPreset()">导出</button>
    <button class="preset-icon-btn" title="导入站位" onclick="triggerImportPreset()">导入</button>

    <input id="preset-file-input" type="file" accept=".json,application/json" style="display: none;"
      onchange="importPositionPreset(event)">
  </div>

  <!-- 左侧抽屉：默认折叠，可编辑自定义笔记 -->
  <aside id="side-drawer" class="side-drawer">
    <div class="drawer-panel">
      <div class="drawer-header">
        <span>自定义内容</span>
        <button class="drawer-close" onclick="toggleDrawer(false)">收起</button>
      </div>

      <textarea id="drawer-note" class="drawer-note" maxlength="500" placeholder="这里可以记录队员说明、站位备注或训练重点"
        oninput="saveDrawerNote()"></textarea>
    </div>

    <button class="drawer-toggle" onclick="toggleDrawer()">备注</button>
  </aside>

  <!-- 首页 -->
  <div id="index-page" class="page active">
    <div class="container index-container">
      <!-- 顶部装饰 -->
      <div class="header-decoration">
        <span class="volleyball-icon">🏐</span>
      </div>

      <!-- 主标题 -->
      <div class="title-wrapper fade-in">
        <h1 class="main-title">排球轮次站位教学</h1>
        <p class="subtitle"></p>
      </div>

      <!-- 功能按钮组 -->
      <div class="button-group">
        <!-- 开始学习按钮 -->
        <div class="btn btn-primary" onclick="goToSetter()">
          <span>开始学习</span>
        </div>

        <!-- 规则说明按钮 -->
        <div class="btn btn-secondary" onclick="goToTutorial()" style="display: none;">
          <span>规则说明</span>
        </div>
      </div>

      <!-- 底部说明 -->
      <div class="footer-info">
        <p class="info-text"></p>
        <p class="info-text"></p>
      </div>
    </div>
  </div>

  <!-- 二传插上主页面 -->
  <div id="setter-page" class="page">
    <div class="container setter-container">
      <!-- 返回按钮 -->
      <div class="nav-back" onclick="goBack()">
        <span>← 返回</span>
      </div>

      <!-- 站位模板标题 -->
      <div class="formation-title-row">
        <span class="formation-title-label">站位名:</span>
        <input id="formation-title-input" class="formation-title-input" maxlength="30" value="默认站位"
          oninput="saveFormationTitle()">
      </div>

      <!-- 顶部信息栏 -->
      <div class="top-info">
        <div class="rotation-info">
          <span class="rotation-label">当前轮次：</span>
          <span class="rotation-value" id="rotation-display">第 1 轮</span>
          <!-- <span class="serve-icon" id="serve-indicator" style="display: none;">反轮</span> -->
          <!-- <span class="actual-pos-label" id="actual-pos-label" style="display: none;">接发球站位</span> -->
          <button class="actual-pos-label actual-pos-switch" id="actual-pos-label" type="button" style="display: none;"
            onclick="togglePositionScene()">
            发球站位
          </button>
        </div>
      </div>

      <!-- 球场区域 -->
      <div class="court-wrapper">
        <div class="court-container" id="court">
          <!-- 位置区域标注（浅色背景数字，固定在场地上） -->
          <div id="court-label-1" class="position-label" style="left: 66.7%; top: 74%;">1</div> <!-- 右后角 -->
          <div id="court-label-2" class="position-label front-row" style="left: 83.3%; top: 26%;">2</div> <!-- 右前角 -->
          <div id="court-label-3" class="position-label front-row" style="left: 50%; top: 26%;">3</div> <!-- 中前 -->
          <div id="court-label-4" class="position-label front-row" style="left: 16.7%; top: 26%;">4</div> <!-- 左前角 -->
          <div id="court-label-5" class="position-label" style="left: 33.3%; top: 74%;">5</div> <!-- 左后角 -->

          <!-- Canvas用于绘制插上路线箭头 -->
          <!-- <canvas id="penetration-canvas" class="penetration-canvas" width="600" height="800"></canvas> -->

          <!-- 球网 -->
          <div class="net"></div>

          <!-- 6个位置的球员（由JavaScript动态创建） -->
          <div id="players-container"></div>

          <button id="reset-position-btn" class="position-reset-btn" type="button"
            onclick="resetCurrentRotationPositionsToBase()">
            重置
          </button>

          <!-- 二传插上后的虚影 -->
          <!-- <div id="setter-shadow" class="player player-shadow" style="display: none;">
            <div class="player-content">
              <span class="player-number" id="shadow-number"></span>
              <span class="player-role">起始</span>
            </div>
          </div> -->
        </div>
      </div>

      <!-- 提示信息 (已移除) -->
      <!--
      <div class="tip" id="status-tip">
        <span class="tip-icon">💡</span>
        <span class="tip-text" id="status-text">二传在前排2号位，理想传球位置，不需要插上</span>
      </div>
      -->

      <!-- 改名提示 -->
      <div class="edit-hint">💡 点击任意球员，可改成真实姓名</div>

      <!-- 控制按钮 -->
      <div class="control-panel">
        <div class="button-row">
          <div class="btn btn-control" id="prev-btn" onclick="prevRotation()">
            <span>◀ 上一轮</span>
          </div>
          <div class="btn btn-control btn-primary" id="next-btn" onclick="nextRotation()">
            <span id="next-btn-text">下一轮 ▶</span>
          </div>
        </div>
        <!-- 变化/恢复原位 + 编辑/保存：基础模式只显示变化；变化模式显示 2:1 两按钮 -->
        <div class="button-row position-action-row" id="position-action-row" style="margin-top: 1.25rem;">
          <div class="btn btn-control btn-secondary position-toggle-btn" id="toggle-position-btn"
            onclick="togglePosition()">
            变化 →
          </div>
          <div class="btn btn-control btn-secondary position-edit-btn" id="edit-position-btn"
            onclick="togglePositionEdit()">
            编辑
          </div>
        </div>
      </div>



      <!-- 开关设置 (已移除) -->
      <!--
      <div class="settings-panel card">
        <div class="settings-title">
          <span>显示设置</span>
        </div>
        <div class="switch-item">
          <span class="switch-label">显示插上路线</span>
          <label class="switch">
            <input type="checkbox" id="route-switch" checked onchange="onRouteSwitch()">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      -->

      <!-- 规则说明按钮 -->
      <div class="help-button" onclick="goToTutorial()" style="display: none;">
        <span>❓ 查看规则说明</span>
      </div>
    </div>
  </div>

  <!-- 开轮位置选择模态框 -->
  <div id="start-pos-modal" class="modal">
    <div class="modal-content modal-picker">
      <div class="modal-header">
        <span class="modal-icon">⚙️</span>
        <span class="modal-title">设置起始位置</span>
        <span class="close-modal" onclick="closeStartPosModal()">×</span>
      </div>
      <div class="modal-body picker-body">

        <div class="picker-sentence">
          <span>你想要让二传在</span>

          <!-- 滚轮组件 -->
          <div class="wheel-container">
            <div class="wheel-highlight"></div> <!-- 中间的高亮框 -->
            <div class="wheel-scroll" id="pos-wheel" onscroll="checkWheelSelection()">
              <!-- 前后加空项是为了让数字能滚到正中间 -->
              <div class="wheel-item placeholder"></div>
              <!-- 顺序：1, 6, 5, 4, 3, 2 (对应 offset 0, 1, 2, 3, 4, 5) -->
              <div class="wheel-item" data-val="1">1</div>
              <div class="wheel-item" data-val="5">5</div>
              <div class="wheel-item" data-val="4">4</div>
              <div class="wheel-item" data-val="3">3</div>
              <div class="wheel-item" data-val="2">2</div>
              <div class="wheel-item placeholder"></div>
            </div>
          </div>

          <span>号位开始？</span>
        </div>

        <div class="btn btn-primary btn-small" onclick="confirmWheelSelection()"
          style="margin-top: 20px; height: 3.5rem; line-height: 3.5rem; font-size: 1.5rem;">
          确定
        </div>

      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/rotation.js"></script>
  <script src="js/position-editor.js"></script>
  <script src="js/app.js"></script>
  <script src="js/export-image.js"></script>
  <script src="js/preset-core.js"></script>
  <script src="js/preset-web.js"></script>
</body>

</html>
